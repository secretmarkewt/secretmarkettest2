<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>404 - Secret Market</title>
    <meta name="robots" content="noindex" />
    <meta name="theme-color" content="#08c400" />
    <style>
      html,
      body {
        width: 100%;
        height: 100%;
        margin: 0;
        background: #070216;
      }

      body {
        display: grid;
        place-items: center;
        overflow: hidden;
      }

      .not-found {
        position: relative;
        width: min(100vw, 177.78vh);
        aspect-ratio: 16 / 9;
        background: url("assets/404-secret-market.jpg") center / cover no-repeat;
      }

      .retry-link {
        position: absolute;
        top: 7.8%;
        left: 39.3%;
        width: 21.8%;
        height: 9.7%;
        border-radius: 16px;
        text-indent: -9999px;
      }

      .retry-link:focus-visible {
        outline: 4px solid #ffffff;
        outline-offset: 6px;
      }

      @media (max-aspect-ratio: 16 / 9) {
        .not-found {
          width: 100vw;
        }
      }
    </style>
  </head>
  <body>
    <main class="not-found" aria-label="404 Secret Market">
      <a class="retry-link" href="/" aria-label="Попробовать еще раз">Попробовать еще раз</a>
    </main>
    <script>
      const retryLink = document.querySelector(".retry-link");
      if (retryLink) {
        const repo = location.hostname.endsWith("github.io") ? location.pathname.split("/").filter(Boolean)[0] : "";
        retryLink.href = repo ? `/${repo}/` : "/";
      }
    </script>
  </body>
</html>
